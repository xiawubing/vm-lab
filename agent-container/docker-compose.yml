services:
  agent:
    image: cve-agent-${CVE_ID_LOWER:-cve-2017-6074}
    build:
      context: .
      args:
        KERNEL_SOURCE_URL: ${KERNEL_SOURCE_URL:-}
        KERNEL_SOURCE_DIR: ${KERNEL_SOURCE_DIR:-}
    environment:
      - ANTHROPIC_API_KEY
      - CVE_ID=${CVE_ID:-CVE-2017-6074}
      - CVE_DIR=${CVE_DIR:-}
      - VM_SSH_HOST=host.docker.internal
      - VM_SSH_PORT=${VM_SSH_PORT:-2226}
      - VM_SSH_USER=${VM_SSH_USER:-ubuntu}
      - VM_SSH_PASSWORD=${VM_SSH_PASSWORD:-ubuntu}
      - VM_CONTROLLER_URL=http://host.docker.internal:8222
      - AGENT=${AGENT:-}
      - AGENT_BUDGET=${AGENT_BUDGET:-}
      - BOOT_MODE=${BOOT_MODE:-}
    volumes:
      - ../agent-logs:/workspace/logs
      - ${KERNEL_SRC_PATH:-./empty-src}:/src:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
